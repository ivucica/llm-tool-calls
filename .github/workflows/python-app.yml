name: Python application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
      checks: write

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      id: run_tests
      run: |
        coverage run -m pytest --junitxml=pytest-junit.xml python_use_example_test.py fakeserver_test.py
      continue-on-error: true
    - name: Generate coverage report
      run: |
        coverage report
        coverage html
        coverage xml
    - name: Upload coverage to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml
    - name: Convert coverage report to markdown badge
      run: |
        pip install genbadge[coverage]
        genbadge coverage -i coverage.xml -o coverage.svg
        echo '![Coverage](data:image/svg+xml;base64,'$(base64 -w 0 coverage.svg)')' > coverage-badge.md
    - name: Add coverage badge to job summary
      run: |
        cat coverage-badge.md >> "$GITHUB_STEP_SUMMARY"
    - name: Post coverage report as comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        header: coverage-badge
        path: coverage-badge.md
    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage.xml  # coverage/**/coverage.cobertura.xml
        badge: true
        #fail_below_min: true
        fail_below_min: false  # Temporary: not until we have clear builds.
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'
    - name: Post coverage report as comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        header: coverage
        path: coverage.md
    - name: Add coverage report to job summary
      run: |
        cat coverage.md >> "$GITHUB_STEP_SUMMARY"
    - name: Upload JUnit test results
      uses: actions/upload-artifact@v4
      with:
        name: junit-test-results-${{ matrix.python-version }}
        path: pytest-junit.xml
    - name: Post junit report
      uses: mikepenz/action-junit-report@v4
      # if we integrate into main bit instead of having a separate workflow:
      if: success() || failure() # always run even if the previous step fails
      with:
        # commit: ${{github.event.workflow_run.head_sha}}  # remove if we don't use separate workflow
        report_paths: 'pytest-junit.xml'  # or something like '**/test.xml'
        include_passed: true
        detailed_summary: true
        annotate_notice: true
        follow_symlink: true
      continue-on-error: true
    - name: Fail if tests failed
      if: always() && steps.run_tests.outcome == 'failure'
      run: exit 1
